name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with MCP extras
        run: pip install -e ".[mcp,test]"

      - name: Run tests
        run: pytest tests/ -v --cov=memory_fabric --cov-report=term-missing

      - name: Verify MCP entry point exists (Linux/macOS)
        if: runner.os != 'Windows'
        run: which memory-fabric-mcp

      - name: Verify MCP entry point exists (Windows)
        if: runner.os == 'Windows'
        run: where memory-fabric-mcp
        shell: cmd

  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with MCP extras and dev tools
        run: |
          pip install -e ".[mcp,test]"
          pip install ruff mypy

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: mypy
        run: mypy src/memory_fabric
